name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "helm/**"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  ECR_BACKEND_REPOSITORY: cloudops-task-tracker-backend
  ECR_FRONTEND_REPOSITORY: cloudops-task-tracker-frontend
  RELEASE_NAME: cloudops-task-tracker
  NAMESPACE: cloudops-task-tracker

jobs:
  deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get runner public IP
        id: runner-ip
        run: echo "ip=$(curl -s https://checkip.amazonaws.com)" >> "$GITHUB_OUTPUT"

      - name: Allow runner to Kubernetes API and SSH
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id "${{ secrets.K3S_SECURITY_GROUP_ID }}" \
            --protocol tcp \
            --port 6443 \
            --cidr "${{ steps.runner-ip.outputs.ip }}/32" || true

          aws ec2 authorize-security-group-ingress \
            --group-id "${{ secrets.K3S_SECURITY_GROUP_ID }}" \
            --protocol tcp \
            --port 22 \
            --cidr "${{ steps.runner-ip.outputs.ip }}/32" || true

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$ECR_BACKEND_REPOSITORY:$IMAGE_TAG" ./app/backend
          docker push "$REGISTRY/$ECR_BACKEND_REPOSITORY:$IMAGE_TAG"

      - name: Build and push frontend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$ECR_FRONTEND_REPOSITORY:$IMAGE_TAG" ./app/frontend
          docker push "$REGISTRY/$ECR_FRONTEND_REPOSITORY:$IMAGE_TAG"

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/cloudops-task-tracker
          chmod 600 ~/.ssh/cloudops-task-tracker

      - name: Copy kubeconfig
        run: |
          scp -o StrictHostKeyChecking=no \
            -i ~/.ssh/cloudops-task-tracker \
            ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/.kube/config ./kubeconfig

          sed -i "s/127.0.0.1/${{ secrets.EC2_HOST }}/g" ./kubeconfig

      - name: Deploy with Helm
        env:
          KUBECONFIG: ./kubeconfig
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          helm upgrade --install "$RELEASE_NAME" ./helm/cloudops-task-tracker \
            --namespace "$NAMESPACE" \
            --set namespace.create=false \
            --set backend.image.repository="$REGISTRY/$ECR_BACKEND_REPOSITORY" \
            --set frontend.image.repository="$REGISTRY/$ECR_FRONTEND_REPOSITORY" \
            --set backend.image.tag="$IMAGE_TAG" \
            --set frontend.image.tag="$IMAGE_TAG" \
            --set app.version="$IMAGE_TAG" \
            --set postgres.password="${{ secrets.POSTGRES_PASSWORD }}"

      - name: Verify rollout
        env:
          KUBECONFIG: ./kubeconfig
        run: |
          kubectl rollout status deployment/backend -n "$NAMESPACE" --timeout=180s
          kubectl rollout status deployment/frontend -n "$NAMESPACE" --timeout=180s
          kubectl get pods -n "$NAMESPACE"

      - name: Revoke runner Kubernetes API and SSH access
        if: ${{ always() }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "${{ secrets.K3S_SECURITY_GROUP_ID }}" \
            --protocol tcp \
            --port 6443 \
            --cidr "${{ steps.runner-ip.outputs.ip }}/32" || true

          aws ec2 revoke-security-group-ingress \
            --group-id "${{ secrets.K3S_SECURITY_GROUP_ID }}" \
            --protocol tcp \
            --port 22 \
            --cidr "${{ steps.runner-ip.outputs.ip }}/32" || true
