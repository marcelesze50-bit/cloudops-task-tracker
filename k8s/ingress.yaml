apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: task-tracker
  namespace: cloudops-task-tracker
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
