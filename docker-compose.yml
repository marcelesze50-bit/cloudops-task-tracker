services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudops-postgres-compose
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./app/backend
    container_name: cloudops-backend
    environment:
      DATABASE_URL: postgresql://taskuser:taskpass@postgres:5432/taskdb
      APP_VERSION: docker-local
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./app/frontend
    container_name: cloudops-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
